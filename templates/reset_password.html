<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - ExpensesIQ</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
  <div class="auth-cards-center">
    <div class="reset-password-card">
      <div class="card-icon lock-icon">🔒</div>
      
      <h1>Reset Password</h1>
      <p class="card-subtitle">Create a new password to secure your account</p>

      {% if otp_sent %}
      <div class="success-message">OTP sent successfully to your registered email address.</div>
      {% endif %}

      {% if error %}
      <div class="error-message">{{ error }}</div>
      {% endif %}

      <form method="post" class="password-form">
        <div class="form-group">
          <label for="otp">One-Time Password (OTP)</label>
          <input id="otp" name="otp" type="text" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" placeholder="Enter 6-digit code" required>
          <small>Check your email for the 6-digit code</small>
        </div>

        <div class="form-group">
          <label for="password">New Password</label>
          <input id="password" name="password" type="password" placeholder="Create a strong password" required>
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="form-btn primary">Reset Password</button>
      </form>

      <div class="form-footer">
        <p><a href="/forgot-password">Request New OTP</a></p>
        <p><a href="/login">Back to Sign In</a></p>
      </div>
    </div>
  </div>
</body>
</html>
