<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ExpensesIQ</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
  <main class="auth-card clean-auth-card">
    <div class="auth-logo mail-logo" aria-hidden="true"></div>

    <h1>Forgot Password</h1>
    <p class="auth-subtitle">OTP will be sent to your registered Gmail</p>

    {% if error %}
    <div class="auth-message auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="clean-auth-form">
      <label for="email">Username or Email</label>
      <input id="email" name="email" placeholder="Enter your username or Gmail" required>
      <button type="submit">Send OTP</button>
    </form>

    <div class="auth-divider"></div>
    <nav class="auth-links single" aria-label="Account links">
      <a href="/login">Back to Login</a>
    </nav>
  </main>
</body>
</html>
