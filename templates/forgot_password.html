<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ExpensesIQ</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
  <div class="auth-cards-center">
    <div class="forgot-password-card">
      <div class="card-icon mail-icon">✉️</div>
      
      <h1>Forgot Password?</h1>
      <p class="card-subtitle">Don't worry, we'll help you reset it. Please enter your email address and we'll send you an OTP to reset your password.</p>

      {% if error %}
      <div class="error-message">{{ error }}</div>
      {% endif %}

      <form method="post" class="password-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="Enter your email address" required>
        </div>

        <button type="submit" class="form-btn primary">Send OTP</button>
      </form>

      <div class="form-footer">
        <p><a href="/login">Remember your password? Sign in</a></p>
      </div>
    </div>
  </div>
</body>
</html>
