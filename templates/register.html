<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - ExpensesIQ</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-left register-left">
      <div class="auth-illustration register-illust">
        <div class="checkmark-badge">✓</div>
      </div>
      <h2>Create Your Account</h2>
      <p>Start your journey towards better financial management today.</p>
      <div class="features-list">
        <div class="feature-item">✓ Track expenses</div>
        <div class="feature-item">✓ Set budgets</div>
        <div class="feature-item">✓ Get insights</div>
        <div class="feature-item">✓ Reach goals</div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card register-card">
        <div class="auth-logo">ExpensesIQ</div>
        <h1>Create Account</h1>

        <form method="post" class="auth-form">
          <div class="form-group">
            <label for="username">Full Name</label>
            <input id="username" name="username" placeholder="Enter your full name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Create a strong password" required>
          </div>

          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" placeholder="Confirm your password" required>
          </div>

          <div class="form-group">
            <label for="group_name">Business / Group Name</label>
            <input id="group_name" name="group_name" placeholder="Enter business or group name" required>
          </div>

          <div class="form-group">
            <label for="role">Account Type</label>
            <select id="role" name="role" required>
              <option value="" disabled selected>Select account type</option>
              <option value="business">Business</option>
              <option value="household">Household</option>
            </select>
          </div>

          <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="/login">Sign In</a></p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
