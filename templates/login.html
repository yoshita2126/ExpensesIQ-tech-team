<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ExpensesIQ</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <div class="auth-illustration">
        <div class="wallet-illust">💳</div>
      </div>
      <h2>Welcome Back!</h2>
      <p>Track your expenses, manage your budget, and achieve your financial goals.</p>
      <div class="features-list">
        <div class="feature-item">✓ Real-time tracking</div>
        <div class="feature-item">✓ Budget alerts</div>
        <div class="feature-item">✓ AI-powered insights</div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-logo">ExpensesIQ</div>
        <h1>Sign in to your account</h1>

        <form method="post" class="auth-form">
            <div class="form-group">
              <label for="username">Email or Username</label>
              <input id="username" name="username" type="text" placeholder="Enter your email or username" required>
            </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="auth-footer">
          <p><a href="/forgot-password">Forgot password?</a></p>
          <p>Don't have an account? <a href="/">Create Account</a></p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
