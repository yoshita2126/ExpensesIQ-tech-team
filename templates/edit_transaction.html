<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Transaction</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="brand">
      <h1>Edit Transaction</h1>
      <p>Update saved transaction details</p>
    </div>
    <div class="nav-links">
      <a href="/dashboard">Back</a>
    </div>
  </header>

  <section class="hero" style="margin-top: 18px;">
    <div class="hero-card" style="max-width: 760px; margin: 0 auto;">
      <form method="post">
        <input type="hidden" name="action" value="edit_transaction">
        <select name="type" required>
          <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Expense</option>
          <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
        </select>
        <input name="amount" type="number" step="0.01" placeholder="Amount" value="{{transaction.amount}}" required>
        <select name="category" id="edit-category-select" required>
          <option value="" disabled {% if transaction.category in ['','Other'] and transaction.category not in ['Office Expenses','Salaries & Wages','Transportation & Delivery','Utilities','Rent & Maintenance','Inventory/Purchases','Marketing & Advertising','Software & Tools','Taxes & Fees','Maintenance & Repairs'] %}selected{% endif %}>Select category</option>
          <option value="Office Expenses" {% if transaction.category == 'Office Expenses' %}selected{% endif %}>🧾 Office Expenses</option>
          <option value="Salaries & Wages" {% if transaction.category == 'Salaries & Wages' %}selected{% endif %}>👨‍💼 Salaries & Wages</option>
          <option value="Transportation & Delivery" {% if transaction.category == 'Transportation & Delivery' %}selected{% endif %}>🚚 Transportation & Delivery</option>
          <option value="Utilities" {% if transaction.category == 'Utilities' %}selected{% endif %}>💡 Utilities</option>
          <option value="Rent & Maintenance" {% if transaction.category == 'Rent & Maintenance' %}selected{% endif %}>🏢 Rent & Maintenance</option>
          <option value="Inventory/Purchases" {% if transaction.category == 'Inventory/Purchases' %}selected{% endif %}>📦 Inventory/Purchases</option>
          <option value="Marketing & Advertising" {% if transaction.category == 'Marketing & Advertising' %}selected{% endif %}>📢 Marketing & Advertising</option>
          <option value="Software & Tools" {% if transaction.category == 'Software & Tools' %}selected{% endif %}>💻 Software & Tools</option>
          <option value="Taxes & Fees" {% if transaction.category == 'Taxes & Fees' %}selected{% endif %}>🏦 Taxes & Fees</option>
          <option value="Maintenance & Repairs" {% if transaction.category == 'Maintenance & Repairs' %}selected{% endif %}>🔧 Maintenance & Repairs</option>
          <option value="Other" {% if transaction.category not in ['Office Expenses','Salaries & Wages','Transportation & Delivery','Utilities','Rent & Maintenance','Inventory/Purchases','Marketing & Advertising','Software & Tools','Taxes & Fees','Maintenance & Repairs'] %}selected{% endif %}>Other</option>
        </select>
        <input name="category_other" id="edit-category-other" type="text" placeholder="Type a custom category" value="{% if transaction.category not in ['Office Expenses','Salaries & Wages','Transportation & Delivery','Utilities','Rent & Maintenance','Inventory/Purchases','Marketing & Advertising','Software & Tools','Taxes & Fees','Maintenance & Repairs'] %}{{transaction.category}}{% endif %}" style="display:none;">
        <input name="note" placeholder="Note (optional)" value="{{transaction.note}}">
        <button type="submit">Save Changes</button>
      </form>
    </div>
  </section>

  <script>
    const editCategorySelect = document.getElementById('edit-category-select');
    const editCategoryOther = document.getElementById('edit-category-other');

    function updateEditCategoryOther() {
      if (!editCategorySelect || !editCategoryOther) {
        return;
      }
      if (editCategorySelect.value === 'Other') {
        editCategoryOther.style.display = 'block';
        editCategoryOther.required = true;
      } else {
        editCategoryOther.style.display = 'none';
        editCategoryOther.required = false;
        editCategoryOther.value = '';
      }
    }

    if (editCategorySelect) {
      editCategorySelect.addEventListener('change', updateEditCategoryOther);
      updateEditCategoryOther();
    }
  </script>
</body>
</html>
